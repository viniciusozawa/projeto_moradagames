<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morada Games</title>
    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style.css">




    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <style>
        body {
            display: flex;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100%;
            flex-direction: row;
            gap: 30px;
            position: relative;
            color: #FFFF;
            background: -webkit-linear-gradient(121deg, #6b4433, #622d2e, #54172f, #3d0634, #180238);
            background: linear-gradient(121deg, #6b4433, #622d2e, #54172f, #3d0634, #180238);

        }

        header {
            display: block;
            position: fixed;
            height: 100vh;
            width: 240px;

        }

        main {
            display: block;
            overflow-y: auto;
            height: 100vh;
            width: 100%;
            box-sizing: border-box;
            margin-left: 240px;
            padding: 20px;
            /*justify-items: center;*/

        }
    </style>
    <script src="https://kit.fontawesome.com/360a0c3340.js" crossorigin="anonymous"></script>

</head>

<body>
    <header>
        <nav>
            <div class="navebar">
                <ul>
                    <li>
                        <a href="">
                            <div>
                                <span class="fa-solid fa-house"></span>
                                <span id="title_nav">HOME</span>
                            </div>
                        </a>
                    </li>
                    <li>
                        <a href="">
                            <div>
                                <span class="fa-solid fa-city"></span>
                                <span id="title_nav">QUEM SOMOS</span>
                            </div>
                        </a>
                    </li>
                    <li>
                        <a href="">
                            <div>
                                <span class="fa-solid fa-circle-info"></span>
                                <span id="title_nv">FAQ</span>
                            </div>
                        </a>
                    </li>
                    <li>
                        <a href="">
                            <div>
                                <span class="fa-solid fa-store"></span>
                                <span id="title_nav">PRODUTOS</span>
                            </div>
                        </a>
                    </li>
                    <li>
                        <a href="">
                            <div>
                                <span class="fa-solid fa-screwdriver-wrench"></span>
                                <span id="title_nav">ASSISTÊNCIA TÉCNICA</span>
                            </div>
                        </a>
                    </li>
                    <li>
                        <a href="">
                            <div>
                                <span class="fa-solid fa-phone"></span>
                                <span id="title_nav">CONTATO</span>
                            </div>
                        </a>
                    </li>
                </ul>






            </div>


        </nav>

    </header>

    <main>
        <div class="main_navebar">
            <ul>
                <li>
                    <a href=""><img src="https://moradagames.com.br/img_site/logo.png" alt="Moradagames_icon"></a>
                </li>
                <li>
                    <span id="icon_form" class="fa-solid fa-phone"></span>
                    <span id="title_nav"><p>(35) 3291-4213</p></span>
                    
                </li>
                <li>
                    <span id="icon_form" class="fa-solid fa-phone"></span>
                    <span id="title_nav"><p>(35) 98855-3750</p></span>
                </li>
            </ul>

        </div>


        <div class="main_videogame">
            <h2>Assistência em:</h2>

            <div class="main_videogamegrid">
                <div>
                    <span>
                        <img src="https://moradagames.com.br/img_site/ps1.png" alt="">
                        <p>PlayStation 1</p>
                    </span>
                </div>
                <div>
                    <span>
                        <img src="https://moradagames.com.br/img_site/game1.png" alt="">
                        <p>PlayStation 2</p>
                    </span>
                </div>
                <div>
                    <span>
                        <img src="https://moradagames.com.br/img_site/game2.png" alt="">
                        <p>PlayStation 3</p>
                    </span>
                </div>
                <div>
                    <span>
                        <img src="https://moradagames.com.br/img_site/PS4.png" alt="">
                        <p>PlayStation 4</p>
                    </span>
                </div>
                <div>
                    <span>
                        <img src="https://moradagames.com.br/img_site/game4.png" alt="">
                        <p>Xbox 360</p>
                    </span>
                </div>
                <div>
                    <span>
                        <img src="https://moradagames.com.br/img_site/xbox1.png" alt="">
                        <p>Xbox One</p>
                    </span>
                </div>
            </div>


        </div>

    </main>




</body>

</html>
